<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Data Analytics Certificate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #030712;
      --surface: #111827;
      --text: #ffffff;
      --muted: #94a3b8;
      --primary: #7c3aed;
      --secondary: #06b6d4;
      --border: rgba(124, 58, 237, 0.3);
      --radius: 26px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.18), transparent 18%),
        linear-gradient(180deg, #030712 0%, #090f1b 100%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .frame {
      width: 100%;
      max-width: 1040px;
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .header {
      padding: 28px 32px;
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.5), rgba(6, 182, 212, 0.4));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header h1 {
      font-size: clamp(1.8rem, 2.4vw, 2.5rem);
      letter-spacing: -0.04em;
    }

    .header p {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 760px;
    }

    .content {
      padding: 28px 32px 36px;
      display: grid;
      gap: 24px;
    }

    .certificate-card {
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .certificate-card img {
      width: 100%;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.25);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
    }

    .btn-primary:hover,
    .btn-primary:focus-visible {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover,
    .btn-secondary:focus-visible {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .header,
      .content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="header">
      <h1>Google Data Analytics Certificate</h1>
      <p>View the full certificate image and verify your Coursera credential from here.</p>
    </div>
    <div class="content">
      <div class="certificate-card">
        <img src="Google_certificate.png" alt="Google Data Analytics certificate" loading="lazy" />
        <div class="actions">
          <a href="https://coursera.org/share/49ad5567deda6a9efa2c98e6bcc61615" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Verify on Coursera</a>
          <a href="index.html" class="btn btn-secondary">Back to portfolio</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
